name: Auto Update Sub

on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch: 

permissions:
  contents: write # Даем права на запись

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Checker Script
        run: python checker.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f sub.txt ]; then
            git add sub.txt
            git commit -m "Автообновление подписки" || echo "Изменений нет"
            git push
          else
            echo "Файл sub.txt не создан (нет рабочих серверов или ошибка скачивания). Пушить нечего."
          fi
