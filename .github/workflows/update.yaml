name: Auto Update Sub (Real Delay)

on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Raw Configs
        run: |
          wget -qO raw.txt "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt"
          grep -E 'vless://|vmess://|trojan://|ss://' raw.txt > configs.txt
          echo "Найдено серверов для проверки: $(wc -l < configs.txt)"

      - name: Setup Xray-Knife
        run: |
          URL=$(curl -s https://api.github.com/repos/lilendian0x00/xray-knife/releases/latest | jq -r '.assets[] | select(.name | contains("linux-amd64.zip")) | .browser_download_url')
          
          if [ -z "$URL" ] || [ "$URL" == "null" ]; then
            echo "Ошибка: Не удалось найти ссылку на xray-knife в API GitHub"
            exit 1
          fi
          
          echo "Скачиваем: $URL"
          wget -qO xray-knife.zip "$URL"
          unzip -o xray-knife.zip
          chmod +x xray-knife*
          find . -name "xray-knife*" -type f -not -name "*.zip" -exec mv {} ./xray-knife \;

          ./xray-knife version

      - name: Run Real Delay Test
        run: |
          ./xray-knife http -f configs.txt -t 20 -o valid.txt
          
          if [ ! -f valid.txt ] || [ ! -s valid.txt ]; then
            echo "Ни один сервер не прошел Real Delay тест."
            exit 0
          fi
          
          echo "Рабочих серверов: $(wc -l < valid.txt)"
          head -n 25 valid.txt > best.txt
          cat best.txt | base64 -w 0 > sub.txt

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [ -f sub.txt ]; then
            git add sub.txt
            git commit -m "Real Delay Update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
            git push
          fi
