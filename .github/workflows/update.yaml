name: Auto Update Sub (Multi-Source + Manual)

on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Public Configs
        run: |
          # Собираем публичные ссылки из ваших новых источников
          touch public_raw.txt
          
          echo "Скачиваю источник 1 (White-Lists-Rus-Mobile)..."
          wget -qO- "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/Vless-Reality-White-Lists-Rus-Mobile.txt" >> public_raw.txt
          
          echo "Скачиваю источник 2 (WHITE-CIDR-RU-all)..."
          wget -qO- "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" >> public_raw.txt
          
          echo "Скачиваю источник 3 (BLACK_SS+All_RUS)..."
          wget -qO- "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_SS%2BAll_RUS.txt" >> public_raw.txt
          
          # Очистка: теперь включая hysteria2://
          grep -iE 'vless://|vmess://|trojan://|ss://|hysteria2://' public_raw.txt | sort | uniq > configs_to_test.txt
          echo "Публичных серверов для теста: $(wc -l < configs_to_test.txt)"

      - name: Setup Xray-Knife
        run: |
          URL=$(curl -s https://api.github.com/repos/lilendian0x00/xray-knife/releases/latest | jq -r '.assets[] | select(.name == "Xray-knife-linux-64.zip") | .browser_download_url')
          wget -qO xray-knife.zip "$URL"
          unzip -o xray-knife.zip -d temp_xray
          mv temp_xray/xray-knife ./xray-knife
          chmod +x xray-knife

      - name: Run Test and Merge with Manual
        run: |
          echo "Запускаем тест (Real Delay)..."
          # Проверка на реальный интернет (mdelay 1500 для качества)
          ./xray-knife http --file configs_to_test.txt --thread 50 --mdelay 1500 --url "http://www.google.com/generate_204" --out valid_public.txt || touch valid_public.txt
          
          # Берем Топ-20 проверенных
          head -n 20 valid_public.txt > best_public.txt
          
          # Формируем финальный список (Сэндвич)
          touch final_list.txt
          
          # 1. Сначала ваши ручные (без фильтров)
          if [ -s manual_configs.txt ]; then
            echo "Добавляю ручные конфиги..."
            cat manual_configs.txt >> final_list.txt
            echo "" >> final_list.txt
          fi
          
          # 2. Потом проверенные публичные
          cat best_public.txt >> final_list.txt
          
          # Чистим пустые строки и пакуем в base64
          sed -i '/^$/d' final_list.txt
          cat final_list.txt | base64 -w 0 > sub.txt
          
          echo "Готово! Ручных: $(wc -l < manual_configs.txt 2>/dev/null || echo 0), публичных отобранных: $(wc -l < best_public.txt)"

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f sub.txt ]; then
            git add sub.txt
            git commit -m "Update sub (Igareck sources + Manual): $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
            git push
          fi
